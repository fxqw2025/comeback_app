name: Build Comeback APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/
          cp script.js www/
          cp style.css www/
          cp manifest.json www/
          cp sw.js www/
          cp -r icons www/
          echo "✅ www folder ready — NO external CDN dependencies"

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@6

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Prepare icon assets for capacitor-assets
        run: |
          mkdir -p assets
          cp icons/icon-512.png assets/icon.png
          cp icons/icon-512.png assets/icon-foreground.png
          cp icons/icon-512.png assets/splash.png
          echo "✅ Assets prepared"

      - name: Generate Android launcher icons
        run: |
          npm install -g @capacitor/assets
          npx capacitor-assets generate --android \
            --iconBackgroundColor '#0a0a12' \
            --iconBackgroundColorDark '#0a0a12' \
            --splashBackgroundColor '#0a0a12' \
            --splashBackgroundColorDark '#0a0a12'
          echo "✅ Icons generated"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
          echo "✅ APK built!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Comeback-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: ls -lh android/app/build/outputs/apk/debug/
